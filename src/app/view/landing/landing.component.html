<div class="landing-container">
  <div class="content">
    <h1 class="title animate__animated animate__fadeInDown">
      {{ languageService.translate("app.title") }}
    </h1>
    <p class="subtitle animate__animated animate__fadeInUp">
      {{ languageService.translate("app.subtitle") }}
    </p>

    <button
      class="btn-start animate__animated animate__pulse animate__infinite"
      (click)="startExplore()"
    >
      {{ languageService.translate("btn.start") }}
    </button>
  </div>
</div>
