<div class="map-container">
  <div id="map"></div>

  <div class="map-toggle">
    <div class="form-check form-switch">
      <input
        class="form-check-input"
        type="checkbox"
        id="displayModeSwitch"
        [(ngModel)]="isCountryMode"
        (change)="onToggleDisplayMode()"
      />
      <label class="form-check-label" for="displayModeSwitch">
        {{
          isCountryMode
            ? languageService.translate("mode.country")
            : languageService.translate("mode.continent")
        }}
      </label>
    </div>
  </div>
</div>

<h2 class="d-flex justify-content-center py-2 position-relative">
  {{ languageService.translate("label.worldMap") }}
  <button
    class="btn btn-primary position-absolute end-0 me-4"
    routerLink="/quiz"
  >
    {{ languageService.translate("btn.quiz") }}
  </button>
</h2>
